name: Sync to Mirror
description: >-
  Force-push branches from the current repo to a mirror repository using an
  SSH deploy key. Self-contained: checks out full history, loads the key,
  and pushes. Standardized, hardened replacement for per-repo sync workflows.

inputs:
  target-repo:
    description: "SSH URL of the mirror repo, e.g. git@github.com:owner/repo.git"
    required: true
  ssh-private-key:
    description: >-
      SSH private key whose public half is added as a write deploy key on the
      mirror repo. Pass the repo's existing SSH secret from the caller workflow.
    required: true
  sync-branches:
    description: "Space-separated branches to sync (e.g. 'main staging')."
    required: false
    default: main
  git-user-name:
    description: >-
      Git committer name for the empty sync commit. Leave both this and
      git-user-email empty to skip the commit and mirror branches as-is.
    required: false
  git-user-email:
    description: >-
      Git committer email for the empty sync commit. Leave both this and
      git-user-name empty to skip the commit and mirror branches as-is.
    required: false

runs:
  using: composite
  steps:
    - name: Checkout (full history)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Load mirror deploy key
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Trust GitHub SSH host
      shell: bash
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Verify source objects
      shell: bash
      run: git fsck --no-dangling

    - name: Configure git identity
      if: inputs.git-user-name != '' && inputs.git-user-email != ''
      shell: bash
      env:
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        git config user.name "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"

    - name: Add mirror remote
      shell: bash
      env:
        TARGET_REPO: ${{ inputs.target-repo }}
      run: git remote add mirror "$TARGET_REPO"

    - name: Validate branch names
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
      run: |
        set -euo pipefail
        for branch in $SYNC_BRANCHES; do
          git check-ref-format --branch "$branch" >/dev/null
          echo "ok: $branch"
        done

    - name: Check out branches
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
      run: |
        set -euo pipefail
        for branch in $SYNC_BRANCHES; do
          echo "Checking out $branch from origin"
          git checkout -B "$branch" "refs/remotes/origin/$branch"
        done

    - name: Create sync commits
      if: inputs.git-user-name != '' && inputs.git-user-email != ''
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
      run: |
        set -euo pipefail
        for branch in $SYNC_BRANCHES; do
          echo "Empty sync commit on $branch"
          git checkout "$branch"
          git commit --allow-empty -m "chore: sync"
        done

    - name: Push branches to mirror
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
      run: |
        set -euo pipefail
        for branch in $SYNC_BRANCHES; do
          echo "Pushing $branch -> mirror/$branch"
          git push mirror "refs/heads/$branch:refs/heads/$branch" --force --no-thin
        done
